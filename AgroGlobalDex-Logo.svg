<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0A1F12"/>
      <stop offset="60%" stop-color="#05100A"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DFFB0"/>
      <stop offset="55%" stop-color="#00FF6A"/>
      <stop offset="100%" stop-color="#00B84B"/>
    </linearGradient>
    <linearGradient id="seed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9CFFC0"/>
      <stop offset="50%" stop-color="#00FF6A"/>
      <stop offset="100%" stop-color="#008C3A"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="seedglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="84" fill="none" stroke="#00FF6A" stroke-opacity="0.25" stroke-width="2"/>

  <g transform="translate(256 256)" filter="url(#glow)">
    <g fill="none" stroke="url(#neon)" stroke-width="14" stroke-linejoin="round" stroke-linecap="round">
      <path d="M0 -170 L147 -85 L147 85 L0 170 L-147 85 L-147 -85 Z"/>
    </g>
    <circle cx="0"    cy="-170" r="11" fill="#00FF6A"/>
    <circle cx="147"  cy="-85"  r="11" fill="#00FF6A"/>
    <circle cx="147"  cy="85"   r="11" fill="#00FF6A"/>
    <circle cx="0"    cy="170"  r="11" fill="#00FF6A"/>
    <circle cx="-147" cy="85"   r="11" fill="#00FF6A"/>
    <circle cx="-147" cy="-85"  r="11" fill="#00FF6A"/>
  </g>

  <g transform="translate(256 256)" filter="url(#seedglow)">
    <path d="M0 -78
             Q44 -78 56 -32
             Q68  14 32  56
             Q0   78 -32 56
             Q-68 14 -56 -32
             Q-44 -78 0 -78 Z"
          fill="url(#seed)"/>
    <path d="M0 -70 Q-6 0 0 70"
          stroke="#04200F" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.55"/>
    <path d="M-3 -55 Q-18 -10 -6 30"
          stroke="#04200F" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
    <ellipse cx="-18" cy="-30" rx="10" ry="16" fill="#B6FFD0" opacity="0.55"/>
  </g>
</svg>
