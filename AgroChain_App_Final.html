  const base=price/(1+change/100);
  return Array.from({length:12},(_,i)=>{
    const t=i/11,n=(Math.random()-.5)*.006;
    return parseFloat((base+(price-base)*t+base*n).toFixed(price>100?2:6));
  });
}

/* ══════ CHART ══════ */
function Chart({data,color,w=100,h=36}){
  if(!data||data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),r=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/r)*h*.85-h*.05}`).join(' ');
  const uid='c'+color.replace('#','')+w+h;
  return(
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{overflow:'visible'}}>
      <defs><linearGradient id={uid} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity=".18"/>
        <stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <polygon points={`0,${h} ${pts} ${w},${h}`} fill={`url(#${uid})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={w} cy={parseFloat(pts.split(' ').pop().split(',')[1])} r="2.5" fill={color}/>
    </svg>
  );
}
function BigChart({data,color}){
  const w=320,h=150;
  if(!data||data.length<2)return null;
  const mn=Math.min(...data)*.98,mx=Math.max(...data)*1.02,r=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/r)*h*.88-h*.04}`).join(' ');
  return(
    <div style={{padding:'0 0 20px'}}>
      <svg width="100%" viewBox={`0 0 ${w} ${h+4}`} style={{overflow:'visible'}}>
        <defs><linearGradient id="bG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity=".18"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient></defs>
        {[.25,.5,.75].map(p=><line key={p} x1="0" y1={h*p} x2={w} y2={h*p} stroke="rgba(255,255,255,.03)" strokeWidth=".5"/>)}
        <polygon points={`0,${h} ${pts} ${w},${h}`} fill="url(#bG)"/>
        <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx={w} cy={parseFloat(pts.split(' ').pop().split(',')[1])} r="4" fill={color}>
          <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
        </circle>
      </svg>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
        {['12h','8h','4h','Ahora'].map(l=><span key={l} style={{fontSize:9,color:'rgba(255,255,255,.2)'}}>{l}</span>)}
      </div>
    </div>
  );
}
function ProgressPhase({progress,phase}){
  const idx=PHASES.indexOf(phase);
  return(
    <div style={{marginTop:8}}>
      <div style={{display:'flex',gap:2,marginBottom:4}}>
        {PHASES.map((p,i)=><div key={p} style={{flex:1,height:3,borderRadius:2,background:i<=idx?P.green:'rgba(255,255,255,.04)'}}/>)}
      </div>
      <div style={{display:'flex',justifyContent:'space-between'}}>
        <span style={{fontSize:9,color:P.t4}}>{phase}</span>
        <span style={{fontSize:9,color:P.green,fontWeight:600}}>{progress}%</span>
      </div>
    </div>
  );
}

  const [swapToSym,setSwapToSym]=useState('USDC');
  const [swapAmt,setSwapAmt]=useState('100');
  const [toast,setToast]=useState(null);
  const [mapFilter,setMapFilter]=useState('ALL');
  const [period,setPeriod]=useState('24H');

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2600);};
  const totalBal=tokens.reduce((s,t)=>s+t.price*t.bal,0);
  const filteredCo=mapFilter==='ALL'?COMPANIES:COMPANIES.filter(c=>c.country===mapFilter);
  const swapFrom=tokens.find(t=>t.sym===swapFromSym)||tokens[1];
  const swapTo=tokens.find(t=>t.sym===swapToSym)||tokens[3];
  const initials=(user?.email||'AC').slice(0,2).toUpperCase();
  const shortW=w=>w?(w.slice(0,6)+'…'+w.slice(-4)):'';

  // Check session
  useEffect(()=>{
    (async()=>{
      const saved=localStorage.getItem('agro_user');
      if(saved){try{const u=JSON.parse(saved);setUser(u);if(u.wallet)setWallet(u.wallet);}catch(e){}}
      else if(SB_OK&&_sb){
        const{data:{session}}=await _sb.auth.getSession().catch(()=>({data:{session:null}}));
        if(session?.user){setUser(session.user);const w=localStorage.getItem('agro_w_'+session.user.id);if(w)setWallet(w);}
        _sb.auth.onAuthStateChange((ev,sess)=>{
          if(ev==='SIGNED_IN'&&sess)setUser(sess.user);
          else if(ev==='SIGNED_OUT'){setUser(null);setWallet(null);}
        });
      }
      setLoaded(true);
    })();
  },[]);

  // Fetch live prices
  useEffect(()=>{
    if(!user)return;
    const ids=TOKEN_CFG.filter(t=>t.cgId).map(t=>t.cgId).join(',');
    fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`)
      .then(r=>r.json())
      .then(data=>{
        setTokens(prev=>prev.map(t=>{
          if(!t.cgId)return{...t};
          const d=data[t.cgId];
          if(!d)return{...t};
          const price=d.usd||FALLBACK[t.sym].price;
          const change=parseFloat((d.usd_24h_change||FALLBACK[t.sym].change).toFixed(2));
          return{...t,price,change,h:mkHistory(price,change)};
        }));
        setPricesLoaded(true);
      })
      .catch(()=>setPricesLoaded(true));
  },[user]);

  const handleAuthSuccess=(u,addr)=>{
    setUser(u);
    if(addr){setWallet(addr);if(u?.id)localStorage.setItem('agro_w_'+u.id,addr);}
  };
  const signOut=async()=>{
    localStorage.removeItem('agro_user');
    if(user?.id)localStorage.removeItem('agro_w_'+user.id);
    if(SB_OK&&_sb)await _sb.auth.signOut().catch(()=>{});
    setUser(null);setWallet(null);setProfileSub(null);setTab('wallet');
  };

  // Clock isolado para no re-renderizar todo
  const Clock=()=>{
    const [t,setT]=useState(new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
    useEffect(()=>{const id=setInterval(()=>setT(new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})),1000);return()=>clearInterval(id);},[]);
    return <span>{t}</span>;
  };

  const StatusBar=()=>(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 22px 2px',fontSize:12,fontWeight:600,color:'#fff',position:'relative',zIndex:10,flexShrink:0}}>
      <Clock/>

      <div style={{display:'flex',alignItems:'center',gap:4}}>
        <svg width="15" height="11" viewBox="0 0 16 12"><path d="M1 9h2v3H1zM5 6h2v6H5zM9 3h2v9H9zM13 0h2v12h-2z" fill="#22C55E"/></svg>
        <svg width="18" height="11" viewBox="0 0 20 12"><rect x="0" y="1" width="17" height="10" rx="2" stroke="#fff" strokeWidth="1" fill="none"/><rect x="2" y="3" width="11" height="6" rx="1" fill="#22C55E"/></svg>

      <div style={{width:34}}/>

  /* ── LOADING ── */
  if(!loaded) return(

    return(
      <div style={{flex:1,overflowY:'auto'}}>
        <div style={{padding:'8px 20px 0'}}><h2 style={{fontSize:20,fontWeight:700,color:P.t1,fontFamily:"'Playfair Display',serif",marginBottom:16}}>Perfil</h2></div>
        <div style={{padding:'0 20px 18px',display:'flex',alignItems:'center',gap:14,borderBottom:`1px solid ${P.border}`}}>
          <div style={{width:56,height:56,borderRadius:18,background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700,color:P.green,fontFamily:"'Playfair Display',serif",flexShrink:0}}>{initials}</div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:16,fontWeight:700,color:P.t1,marginBottom:2}}>{name}</p>
            <p style={{fontSize:11,color:P.t4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user?.email}</p>
            <div style={{display:'flex',gap:5,marginTop:6,flexWrap:'wrap'}}>
              {isDemo&&<span style={{fontSize:9,fontWeight:700,background:'rgba(229,173,48,.1)',color:P.gold,border:'1px solid rgba(229,173,48,.2)',borderRadius:20,padding:'2px 8px'}}>⚡ Demo</span>}
              {provider==='phantom'&&<span style={{fontSize:9,fontWeight:700,background:'rgba(153,69,255,.1)',color:'#9945FF',border:'1px solid rgba(153,69,255,.25)',borderRadius:20,padding:'2px 8px'}}>Phantom</span>}
              {provider==='metamask'&&<span style={{fontSize:9,fontWeight:700,background:'rgba(246,133,27,.1)',color:'#F6851B',border:'1px solid rgba(246,133,27,.25)',borderRadius:20,padding:'2px 8px'}}>MetaMask</span>}
              {provider==='apple'&&<span style={{fontSize:9,fontWeight:700,background:'rgba(255,255,255,.07)',color:P.t2,border:'1px solid rgba(255,255,255,.12)',borderRadius:20,padding:'2px 8px'}}> Apple</span>}
              {!isDemo&&<span style={{fontSize:9,fontWeight:700,background:'rgba(34,197,94,.1)',color:P.green,border:'1px solid rgba(34,197,94,.2)',borderRadius:20,padding:'2px 8px'}}>✓ Verificado</span>}
            </div>
          </div>
        </div>
        <div style={{padding:'14px 20px 16px',borderBottom:`1px solid ${P.border}`}}>
          <p style={{fontSize:9,fontWeight:700,color:P.t4,textTransform:'uppercase',letterSpacing:1.2,marginBottom:10}}>Wallet Web3</p>
          {wallet?(
            <div style={{background:'rgba(34,197,94,.05)',border:'1px solid rgba(34,197,94,.12)',borderRadius:12,padding:'12px 14px'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <div style={{width:7,height:7,borderRadius:'50%',background:P.green,animation:'pulse 2s infinite'}}/>
                <span style={{fontSize:10,fontWeight:700,color:P.green,letterSpacing:'.5px'}}>CONECTADA · {(provider||'web3').toUpperCase()}</span>
              </div>
              <p style={{fontSize:11,color:P.t2,fontFamily:'monospace',wordBreak:'break-all',lineHeight:1.5}}>{wallet}</p>
            </div>
          ):(
            <div onClick={()=>setUser(null)} style={{background:'rgba(255,255,255,.03)',border:'1px dashed rgba(255,255,255,.1)',borderRadius:12,padding:'14px',textAlign:'center',cursor:'pointer'}}>
              <p style={{fontSize:20,marginBottom:4}}>◎</p>
              <p style={{fontSize:13,fontWeight:600,color:P.t3}}>Conectar wallet</p>
              <p style={{fontSize:11,color:P.t4,marginTop:2}}>Phantom · MetaMask · WalletConnect</p>
            </div>
          )}
        </div>
        <div style={{paddingBottom:90}}>
          {[
            {icon:'⊙',label:'Editar perfil',sub:'Nombre, foto, país',key:'edit'},
            {icon:'🔒',label:'Seguridad',sub:'Contraseña, 2FA, biométrico',key:'security'},
            {icon:'📋',label:'Verificación KYC',sub:isDemo?'Pendiente · Requerido >€1.000':'Niveles 1 y 2 completados',val:isDemo?'Pendiente':'✓',valColor:isDemo?P.gold:P.green,key:'kyc'},
            {icon:'🔔',label:'Notificaciones',sub:'Ciclos, rendimientos, alertas',key:'notif'},
            {icon:'◈',label:'Red blockchain',sub:'Solana · Ethereum · Polygon',key:'network'},
          ].map(item=>(
            <div key={item.key} onClick={()=>setProfileSub(item.key)} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 20px',borderBottom:`1px solid rgba(255,255,255,.03)`,cursor:'pointer'}}>
              <div style={{width:36,height:36,borderRadius:11,background:'rgba(255,255,255,.04)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>{item.icon}</div>
              <div style={{flex:1}}><p style={{fontSize:14,fontWeight:500,color:P.t1}}>{item.label}</p><p style={{fontSize:11,color:P.t4,marginTop:1}}>{item.sub}</p></div>
              {item.val&&<span style={{fontSize:11,fontWeight:700,color:item.valColor}}>{item.val}</span>}
              <span style={{color:P.t4,fontSize:14}}>›</span>
            </div>
          ))}
          {isDemo&&<div style={{margin:'12px 16px',background:'rgba(229,173,48,.05)',border:'1px solid rgba(229,173,48,.15)',borderRadius:14,padding:14}}>
            <p style={{fontSize:12,fontWeight:700,color:P.gold,marginBottom:4}}>⚡ Demo · precios reales de CoinGecko</p>
            <p style={{fontSize:11,color:P.t3,lineHeight:1.6}}>Configura Supabase para cuenta permanente sincronizada con agrochaindex.io.</p>
          </div>}
          <div onClick={signOut} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 20px',marginTop:8,cursor:'pointer'}}>
            <div style={{width:36,height:36,borderRadius:11,background:'rgba(239,68,68,.07)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,flexShrink:0}}>↩</div>
            <p style={{fontSize:14,fontWeight:600,color:'#ef4444'}}>Cerrar sesión</p>
          </div>
        </div>
      </div>
    );
  };

  /* ── RENDER ── */
  const renderContent=()=>{
    if(selCompany)return <CompanyDetail/>;
    if(screen==='tokenDetail')return <TokenDetail/>;
    if(tab==='wallet')return <WalletScreen/>;
    if(tab==='map')return <MapScreen/>;
    if(tab==='swap')return <SwapScreen/>;
    if(tab==='feed')return <FeedScreen/>;
    if(tab==='profile')return <ProfileScreen/>;
    return <WalletScreen/>;
  };

  const NAV=[
    {id:'wallet',label:'Wallet',icon:'◎'},
    {id:'map',label:'Market',icon:'◈'},
    {id:'swap',label:'Swap',icon:'⇄'},
    {id:'feed',label:'Feed',icon:'◉'},
    {id:'profile',label:'Perfil',icon:'⊙'},
  ];

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'30px 16px',background:'linear-gradient(180deg,#020504,#050a07,#020504)'}}>
      <div style={{width:390,height:844,background:'#000',borderRadius:48,overflow:'hidden',position:'relative',border:'3px solid #1a1a1a',boxShadow:'0 0 0 1px rgba(255,255,255,.04),0 50px 120px rgba(0,0,0,.85),0 0 80px rgba(34,197,94,.07)'}}>
        <div style={{height:'100%',display:'flex',flexDirection:'column',background:P.bg}}>
          <StatusBar/>
          {renderContent()}
          {/* Solo muestra nav si no está en profile sub o company detail */}
          {!selCompany&&(
            <div style={{display:'flex',justifyContent:'space-around',alignItems:'center',padding:'6px 0 24px',background:'linear-gradient(to top,rgba(5,10,7,1) 70%,rgba(5,10,7,.85))',borderTop:`1px solid ${P.border}`,position:'relative',zIndex:10,flexShrink:0}}>
              {NAV.map(n=>{
                const active=tab===n.id&&!screen;
                return(
                  <div key={n.id} onClick={()=>{setTab(n.id);setScreen(null);setSelToken(null);setSelCompany(null);setSelCountry(null);setMapFilter('ALL');setProfileSub(null);}} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,cursor:'pointer',padding:'4px 10px',opacity:active?1:.35,transition:'all .2s'}}>
                    <span style={{fontSize:22,color:active?P.green:P.t1,transition:'color .2s'}}>{n.icon}</span>
                    {active&&<div style={{width:4,height:4,borderRadius:2,background:P.green}}/>}
                    <span style={{fontSize:9,fontWeight:600,letterSpacing:.4,color:P.t1}}>{n.label}</span>
                  </div>
                );
              })}
            </div>
          )}
          {toast&&(
            <div style={{position:'absolute',bottom:100,left:20,right:20,background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.18)',borderRadius:14,padding:'12px 16px',display:'flex',alignItems:'center',gap:10,animation:'fsu .3s ease',backdropFilter:'blur(20px)',zIndex:50}}>
              <div style={{width:28,height:28,borderRadius:8,background:'rgba(34,197,94,.12)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:P.green}}>✓</div>
              <p style={{fontSize:12,fontWeight:600,color:P.t1}}>{toast}</p>
            </div>
          )}
          <div style={{position:'absolute',bottom:6,left:'50%',transform:'translateX(-50%)',width:134,height:5,borderRadius:3,background:'rgba(255,255,255,.12)'}}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
