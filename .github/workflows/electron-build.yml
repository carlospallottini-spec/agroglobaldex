name: Build AgroGlobalDex (.exe Windows + macOS .dmg + Linux .AppImage)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:    # también permite disparar manual desde la UI de GitHub

permissions:
  contents: write       # necesario para crear releases

# Silencia la advertencia de Node 20 → Node 24 que GitHub muestra en runs viejos.
# Las actions @v4 ya soportan Node 24 por env var.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ──────────────────────────────────────────────────────────────────
  # WINDOWS .exe (portable + NSIS installer)
  # ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync web 2.0/ into agrochain-electron/src/
        shell: pwsh
        run: |
          if (Test-Path agrochain-electron\src) {
            Remove-Item -Recurse -Force agrochain-electron\src
          }
          New-Item -ItemType Directory -Path agrochain-electron\src | Out-Null
          Copy-Item -Recurse "web 2.0\*" agrochain-electron\src\

      - name: Install dependencies
        working-directory: agrochain-electron
        run: npm install

      - name: Build Windows installers
        working-directory: agrochain-electron
        run: npm run build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AgroGlobalDex-Windows
          path: |
            agrochain-electron/dist/*.exe
            agrochain-electron/dist/latest.yml

  # ──────────────────────────────────────────────────────────────────
  # macOS .dmg (Intel + Apple Silicon)
  # ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    continue-on-error: true     # macOS sin signing puede fallar; no bloquea el resto
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Sync web 2.0/ into agrochain-electron/src/
        run: |
          rm -rf agrochain-electron/src
          mkdir -p agrochain-electron/src
          cp -r "web 2.0/." agrochain-electron/src/

      - name: Install dependencies
        working-directory: agrochain-electron
        run: npm install

      - name: Build macOS .dmg
        working-directory: agrochain-electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --arm64 -c.mac.identity=null
        continue-on-error: true

      - name: Upload macOS artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AgroGlobalDex-macOS
          path: |
            agrochain-electron/dist/*.dmg
            agrochain-electron/dist/*.zip

  # ──────────────────────────────────────────────────────────────────
  # Linux .AppImage + .deb
  # ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Sync web 2.0/ into agrochain-electron/src/
        run: |
          rm -rf agrochain-electron/src
          mkdir -p agrochain-electron/src
          cp -r "web 2.0/." agrochain-electron/src/

      - name: Install dependencies
        working-directory: agrochain-electron
        run: npm install

      - name: Build Linux .AppImage
        working-directory: agrochain-electron
        run: npx electron-builder --linux AppImage --x64
        continue-on-error: true

      - name: Upload Linux artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AgroGlobalDex-Linux
          path: |
            agrochain-electron/dist/*.AppImage
            agrochain-electron/dist/*.deb

  # ──────────────────────────────────────────────────────────────────
  # ANDROID APK (Capacitor) — debug-signed, sideloadable
  # ──────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    continue-on-error: true   # build APK no debe bloquear el release de desktop si Gradle revienta
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor deps
        working-directory: mobile
        run: npm install

      - name: Add Android platform + sync
        working-directory: mobile
        run: |
          npx cap add android || true   # idempotente: si ya está agregado, no falla
          npx cap sync android

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK with version
        working-directory: mobile/android/app/build/outputs/apk/debug
        run: |
          VERSION=$(node -p "require('../../../../../../../agrochain-electron/package.json').version")
          mv app-debug.apk "AgroGlobalDex-${VERSION}-debug.apk"

      - name: Upload Android APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AgroGlobalDex-Android
          path: mobile/android/app/build/outputs/apk/debug/*.apk

  # ──────────────────────────────────────────────────────────────────
  # PUBLICAR RELEASE — junta los 4 artifacts y los pega como un release
  # público. Se ejecuta en cada push de tag v* (release oficial)
  # Y TAMBIÉN en cada workflow_dispatch (pre-release con tag automático).
  # ──────────────────────────────────────────────────────────────────
  release:
    needs: [ build-windows, build-macos, build-linux, build-android ]
    runs-on: ubuntu-latest
    # Se ejecuta tanto en tags v* como en workflow_dispatch manual
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compute release tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Push de tag → usar el tag tal cual
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "name=AgroGlobalDex ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            # workflow_dispatch → tag auto con commit SHA corto
            SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
            STAMP=$(date -u +'%Y%m%d-%H%M%S')
            echo "tag=build-${STAMP}-${SHORT}" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "name=AgroGlobalDex build-${STAMP}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/AgroGlobalDex-Windows/**
            dist/AgroGlobalDex-macOS/**
            dist/AgroGlobalDex-Linux/**
            dist/AgroGlobalDex-Android/**
          body: |
            ## AgroGlobalDex — ${{ steps.tag.outputs.name }}

            **Marketplace de RWA agropecuarios sobre Solana · MiCA-first · Demo/PoC**

            ### 📦 Descargar la app desktop
            - **Windows**: `AgroGlobalDex-Setup-*.exe` (instalador) o `*-portable.exe` (sin instalar)
            - **macOS**: `AgroGlobalDex-*.dmg` (Intel + Apple Silicon)
            - **Linux**: `AgroGlobalDex-*.AppImage`

            ### 📱 Descargar la app móvil
            - **Android APK** (sideload): `AgroGlobalDex-*-debug.apk` — debug-signed,
              instalar con `adb install` o desde el File Manager del teléfono después
              de habilitar "Orígenes desconocidos". Para Play Store hacen falta
              ProGuard rules + release signing (post-funding).
            - **iOS**: por ahora vía PWA — abrí el sitio en Safari → "Añadir a
              pantalla de inicio". App nativa iOS post-funding.

            ### 🌐 Probar en el navegador
            Cloná el repo y serví `web 2.0/`:
            ```bash
            git clone https://github.com/carlospallottini-spec/agroglobaldex
            cd agroglobaldex
            python3 -m http.server 8000 --directory "web 2.0"
            # http://localhost:8000
            ```

            ### 🔗 Smart contracts
            - 17 instrucciones · 2 programas Anchor compilando contra Solana 3.0
            - Audit pendiente · NO usar en mainnet con valor real

            ### ⚖️ Disclaimer
            Demo/PoC. Sin autorización CASP MiCA al día de hoy. No constituye oferta de inversión.
