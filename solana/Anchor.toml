[toolchain]
anchor_version = "0.31.1"
solana_version = "3.0.0"

[features]
resolution = true
skip-lint = false

[programs.localnet]
agroglobaldex = "G2n9JXE5FLRRprM1R4gga1uF3yT6jneHDzSX913xLR2a"
compliance_hook = "GFFp2bThyR33mxbVQiohGL22eEs12eJhvKyEnUoCL8tL"

[programs.devnet]
agroglobaldex = "G2n9JXE5FLRRprM1R4gga1uF3yT6jneHDzSX913xLR2a"
compliance_hook = "GFFp2bThyR33mxbVQiohGL22eEs12eJhvKyEnUoCL8tL"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
# Headroom for solana-test-validator cold-start before the first blockhash.
startup_wait = 60000

# NOTE: we intentionally do NOT clone Token-2022 from mainnet. Agave 3.0's
# solana-test-validator already bundles Token-2022 (TokenzQd...) as a built-in
# program, and cloning it from the public mainnet-beta RPC hangs the validator
# at "Initializing..." in CI (rate-limited/blocked network fetch).

[workspace]
members = ["programs/agroglobaldex", "programs/compliance-hook"]
