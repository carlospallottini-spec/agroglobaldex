[toolchain]
anchor_version = "0.31.1"
solana_version = "3.0.0"

[features]
resolution = true
skip-lint = false

[programs.localnet]
agroglobaldex = "G2n9JXE5FLRRprM1R4gga1uF3yT6jneHDzSX913xLR2a"
compliance_hook = "GFFp2bThyR33mxbVQiohGL22eEs12eJhvKyEnUoCL8tL"

[programs.devnet]
agroglobaldex = "G2n9JXE5FLRRprM1R4gga1uF3yT6jneHDzSX913xLR2a"
compliance_hook = "GFFp2bThyR33mxbVQiohGL22eEs12eJhvKyEnUoCL8tL"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
# Cold-start of solana-test-validator on CI (cloning Token-2022 from mainnet)
# can take well over the 5s default before the first blockhash is available.
startup_wait = 60000

[test.validator]
url = "https://api.mainnet-beta.solana.com"

# Clone Token-2022 program from mainnet into local validator for tests
[[test.validator.clone]]
address = "TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb"

[workspace]
members = ["programs/agroglobaldex", "programs/compliance-hook"]
