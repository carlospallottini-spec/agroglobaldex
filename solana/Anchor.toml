[toolchain]
anchor_version = "0.31.1"
solana_version = "3.0.0"

[features]
resolution = true
skip-lint = false

[programs.localnet]
agroglobaldex = "G2n9JXE5FLRRprM1R4gga1uF3yT6jneHDzSX913xLR2a"
compliance_hook = "GFFp2bThyR33mxbVQiohGL22eEs12eJhvKyEnUoCL8tL"

[programs.devnet]
agroglobaldex = "G2n9JXE5FLRRprM1R4gga1uF3yT6jneHDzSX913xLR2a"
compliance_hook = "GFFp2bThyR33mxbVQiohGL22eEs12eJhvKyEnUoCL8tL"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
# Headroom for solana-test-validator cold-start before the first blockhash.
startup_wait = 60000

# Pin the validator's gossip/bind addresses: on recent GitHub runner images the
# test-validator panics resolving its gossip IP (UnspecifiedIpAddr 0.0.0.0).
[test.validator]
bind_address = "0.0.0.0"
gossip_host = "127.0.0.1"

# Load Token-2022 from a committed fixture (mainnet's program, dumped to
# tests/fixtures/token_2022.so) at its canonical address. Rationale:
#  - the validator's built-in Token-2022 rejects our MetadataPointer + token
#    metadata mint init with InvalidAccountData;
#  - cloning it from the public mainnet RPC hangs the validator at
#    "Initializing..." in CI (rate-limited fetch).
# A local genesis program is deterministic and needs zero network at runtime.
[[test.genesis]]
address = "TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb"
program = "tests/fixtures/token_2022.so"

# Synthetic Pyth PriceUpdateV2 account (owner = Pyth receiver) so the oracle
# path (refresh_collateral_price) can be exercised on-chain without a live feed.
[[test.validator.account]]
address = "3tACy7sXfF7hF8mXcmQsLgQMYshk6Rx5y3X7E5yFDwVy"
filename = "tests/fixtures/pyth_price.json"

[workspace]
members = ["programs/agroglobaldex", "programs/compliance-hook"]
