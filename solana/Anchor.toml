# Clone Token-2022 program from mainnet into local validator for tests
[[test.validator.clone]]
address = "TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb"

[workspace]
members = ["programs/agroglobaldex"]
