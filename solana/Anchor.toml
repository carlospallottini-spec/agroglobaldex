[toolchain]
anchor_version = "0.30.1"
solana_version = "1.18.17"

[features]
resolution = true
skip-lint = false

[programs.localnet]
agroglobaldex = "AGRoG1obA1Dex11111111111111111111111111111"

[programs.devnet]
agroglobaldex = "AGRoG1obA1Dex11111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
